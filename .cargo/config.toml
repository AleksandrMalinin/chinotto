# rustc may pass `-L .../clang/17/lib/darwin` while Xcode only ships e.g. `clang/21`, which breaks
# linking `libclang_rt.osx`. Add the real runtime search path for Apple Silicon and Intel macOS hosts.
# If linking still fails after an Xcode upgrade, run: ls "$(xcode-select -p)"/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang
# and adjust the version segment below (or create a symlink `clang/17` -> `clang/<ver>` in that directory).
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-L/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/21/lib/darwin"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-L/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/21/lib/darwin"]
