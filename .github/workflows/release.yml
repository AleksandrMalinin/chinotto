name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require TAURI_SIGNING_PRIVATE_KEY
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Set Actions secret TAURI_SIGNING_PRIVATE_KEY (minisign private key contents). See docs/updater.md"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Repo uses npm ci + package-lock.json; pnpm-lock.yaml would make the action pick pnpm instead.
          tauriScript: npm run tauri
          tagName: v__VERSION__
          releaseName: Chinotto v__VERSION__
          releaseBody: "Apple Silicon (aarch64) build. Attach notarized DMG locally if needed; `latest.json` supports in-app updates."
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
