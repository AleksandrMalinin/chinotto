name: release

on:
  push:
    tags:
      - "v*"
  # Use when a tag already exists at the same commit (push is a no-op → no `push` event).
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: rel
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == v* ]]; then
            echo "tag=$REF" >> "$GITHUB_OUTPUT"
          else
            VER=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
            echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Require TAURI_SIGNING_PRIVATE_KEY
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Set Actions secret TAURI_SIGNING_PRIVATE_KEY (minisign private key contents). See docs/updater.md"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # Optional: Developer ID .p12 (base64) + password + full signing identity string.
      # See docs/updater.md → “Apple code signing & notarization (CI)”.
      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_IN: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_SIGNING_IDENTITY_IN:-}" ]; then
            echo "::notice::Skipping Apple certificate import (set APPLE_CERTIFICATE and APPLE_SIGNING_IDENTITY to enable)."
            exit 0
          fi
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          printf '%s' "$APPLE_CERTIFICATE" | /usr/bin/base64 -D > /tmp/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "${APPLE_CERTIFICATE_PASSWORD:-}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f /tmp/certificate.p12
          security find-identity -v -p codesigning build.keychain
          {
            echo "APPLE_SIGNING_IDENTITY<<EOF"
            echo "$APPLE_SIGNING_IDENTITY_IN"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # Optional: App Store Connect API key (.p8 contents) for notarization (same as local release).
      - name: Write App Store Connect API key
        env:
          APPLE_CONNECT_P8: ${{ secrets.APPLE_CONNECT_P8 }}
          APPLE_API_KEY_CHECK: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER_CHECK: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CONNECT_P8:-}" ] || [ -z "${APPLE_API_KEY_CHECK:-}" ] || [ -z "${APPLE_API_ISSUER_CHECK:-}" ]; then
            echo "::notice::Skipping notarization key (set APPLE_CONNECT_P8, APPLE_API_KEY, and APPLE_API_ISSUER to enable)."
            exit 0
          fi
          KEY_PATH="${RUNNER_TEMP}/api_key.p8"
          echo "$APPLE_CONNECT_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Compose GitHub release body
        id: release_notes
        run: |
          set -euo pipefail
          TAG="${{ steps.rel.outputs.tag }}"
          COMMON="$(printf '%s\n' \
            "Apple Silicon (aarch64)." \
            "" \
            "Feedback welcome:" \
            "https://github.com/AleksandrMalinin/chinotto/issues")"
          if BODY="$(python3 scripts/extract-release-notes.py "$TAG" docs/github-release-notes.md 2>/dev/null)"; then
            {
              echo "body<<EOF"
              printf '%s\n\n' "$BODY"
              printf '%s\n' "$COMMON"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No '## ${TAG}' section in docs/github-release-notes.md; using common text only."
            {
              echo "body<<EOF"
              printf '%s\n' "$COMMON"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          tauriScript: npm run tauri
          tagName: v__VERSION__
          releaseName: Chinotto v__VERSION__
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      # Stable filename so website / docs can use .../releases/latest/download/Chinotto_macOS_aarch64.dmg
      - name: Upload stable DMG name for direct download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.rel.outputs.tag }}"
          mapfile -t _dmgs < <(find src-tauri/target -name 'Chinotto_*_aarch64.dmg' -type f)
          if [ "${#_dmgs[@]}" -eq 0 ]; then
            echo "::error::No Chinotto_*_aarch64.dmg under src-tauri/target"
            exit 1
          fi
          DMG=$(printf '%s\n' "${_dmgs[@]}" | xargs ls -t | head -1)
          cp "$DMG" Chinotto_macOS_aarch64.dmg
          gh release upload "$TAG" Chinotto_macOS_aarch64.dmg --clobber
